services:
  ciyuan-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ciyuan-chat
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      API_BASE_URL: http://host.docker.internal/v1
      IMAGE_API_BASE_URL: https://imgapi.ciyuan.fast/v1
      MODELS_ENDPOINT: /models
      CHAT_COMPLETIONS_ENDPOINT: /chat/completions
      RESPONSES_ENDPOINT: /responses
      IMAGE_GENERATIONS_ENDPOINT: /images/generations
      IMAGE_EDITS_ENDPOINT: /images/edits
      IMAGE_VARIATIONS_ENDPOINT: /images/variations
      IMAGE_MODEL: ""
      PORT: 3000
      UPSTREAM_TIMEOUT_MS: 600000
      FRAME_ANCESTORS: "'self' https://ciyuan.fast https://*.ciyuan.fast"
    expose:
      - "3000"
    ports:
      - "3000:3000"
